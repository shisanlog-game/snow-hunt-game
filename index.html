<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>スノーハント商会 v0.2</title>
<style>
  :root {
    --bg: #eaf6ff;
    --ink: #172033;
    --muted: #5c6b82;
    --blue: #2563eb;
    --green: #16a34a;
    --orange: #f59e0b;
    --red: #ef4444;
    --card: rgba(255,255,255,.9);
    --line: rgba(23,32,51,.13);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, #dff3ff 0%, #f7fbff 56%, #e9f4ff 100%);
    overflow-x: hidden;
    touch-action: manipulation;
  }
  .app {
    max-width: 1180px;
    margin: 0 auto;
    padding: 12px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 330px;
    gap: 12px;
  }
  .top {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
  .subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .pill {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    min-width: 88px;
    box-shadow: 0 8px 24px rgba(31,72,109,.08);
  }
  .pill b { display: block; font-size: 18px; line-height: 1.1; }
  .pill span { color: var(--muted); font-size: 11px; }
  .arena {
    position: relative;
    min-height: 600px;
    border-radius: 8px;
    overflow: hidden;
    background:
      radial-gradient(circle at 20% 18%, rgba(255,255,255,.95) 0 4px, transparent 5px),
      radial-gradient(circle at 70% 28%, rgba(255,255,255,.85) 0 3px, transparent 4px),
      linear-gradient(180deg, #bfe8ff 0 34%, #f8fdff 34% 100%);
    border: 1px solid var(--line);
    box-shadow: inset 0 -18px 60px rgba(92,169,216,.18), 0 16px 40px rgba(31,72,109,.12);
  }
  .mountain {
    position: absolute;
    left: -8%;
    right: -8%;
    top: 18%;
    height: 180px;
    background:
      linear-gradient(45deg, transparent 0 42%, rgba(255,255,255,.9) 42% 51%, transparent 51%),
      linear-gradient(135deg, #8ac7e9 0 50%, transparent 50%);
    clip-path: polygon(0 100%, 16% 48%, 26% 100%, 43% 25%, 61% 100%, 78% 38%, 100% 100%);
    opacity: .75;
  }
  .snowfield {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 66%;
    background:
      radial-gradient(ellipse at 22% 75%, rgba(207,232,247,.9) 0 42px, transparent 43px),
      radial-gradient(ellipse at 74% 86%, rgba(207,232,247,.85) 0 58px, transparent 59px),
      linear-gradient(180deg, #fbfeff 0%, #edf8ff 100%);
  }
  .hpBox {
    position: absolute;
    left: 50%;
    top: 22px;
    width: min(420px, 88%);
    transform: translateX(-50%);
    background: rgba(255,255,255,.88);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    z-index: 6;
    box-shadow: 0 10px 24px rgba(31,72,109,.1);
  }
  .hpTop {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-weight: 800;
    margin-bottom: 7px;
    font-size: 14px;
  }
  .bar {
    height: 16px;
    border: 2px solid #263244;
    border-radius: 999px;
    overflow: hidden;
    background: #e5e7eb;
  }
  .barFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444);
    transition: width .14s ease;
  }
  .worldItem {
    position: absolute;
    transform: translate(-50%, -50%);
    user-select: none;
  }
  .bearWrap {
    left: 58%;
    top: 44%;
    width: min(240px, 45vw);
    aspect-ratio: 1.2;
    cursor: pointer;
    z-index: 3;
    transition: transform .08s ease;
  }
  .bearWrap.hit { transform: translate(-50%, -50%) scale(.96); }
  .bear {
    position: absolute;
    inset: 20% 4% 4%;
    background: #f9fdff;
    border: 3px solid #263244;
    border-radius: 48% 48% 42% 42%;
    box-shadow: inset -18px -24px 0 #dcecf7, 0 18px 36px rgba(23,32,51,.14);
  }
  .bear:before, .bear:after {
    content: "";
    position: absolute;
    width: 24%;
    aspect-ratio: 1;
    top: -18%;
    background: #f9fdff;
    border: 3px solid #263244;
    border-radius: 50%;
    z-index: -1;
  }
  .bear:before { left: 10%; }
  .bear:after { right: 10%; }
  .face {
    position: absolute;
    left: 50%;
    top: 34%;
    width: 38%;
    aspect-ratio: 1.1;
    transform: translateX(-50%);
    background: #eef7fc;
    border: 2px solid #263244;
    border-radius: 48%;
  }
  .eye {
    position: absolute;
    top: 22%;
    width: 9px;
    height: 9px;
    background: #111827;
    border-radius: 50%;
  }
  .eye.left { left: 29%; }
  .eye.right { right: 29%; }
  .nose {
    position: absolute;
    left: 50%;
    top: 43%;
    width: 20px;
    height: 14px;
    transform: translateX(-50%);
    background: #111827;
    border-radius: 50%;
  }
  .claw {
    position: absolute;
    top: 48%;
    width: 18%;
    height: 28%;
    background: #f9fdff;
    border: 3px solid #263244;
    border-radius: 45%;
  }
  .claw.left { left: -2%; transform: rotate(12deg); }
  .claw.right { right: -2%; transform: rotate(-12deg); }
  .vendor {
    left: 83%;
    top: 74%;
    width: 104px;
    height: 118px;
    z-index: 2;
  }
  .stall {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 70px;
    background: #f8fafc;
    border: 3px solid #263244;
    border-radius: 8px;
  }
  .stall:before {
    content: "売店";
    position: absolute;
    left: 50%;
    top: 12px;
    transform: translateX(-50%);
    font-weight: 800;
  }
  .roof {
    position: absolute;
    left: -8px;
    right: -8px;
    top: 18px;
    height: 34px;
    background: repeating-linear-gradient(90deg, #ef4444 0 18px, #fff 18px 36px);
    border: 3px solid #263244;
    border-radius: 8px 8px 4px 4px;
  }
  .player {
    width: 88px;
    height: 144px;
    z-index: 5;
    filter: drop-shadow(0 12px 18px rgba(23,32,51,.18));
    transition: filter .12s ease;
  }
  .player.near { filter: drop-shadow(0 0 18px rgba(245,158,11,.68)); }
  .head {
    width: 38px;
    height: 38px;
    margin: 0 auto;
    background: #f5c7a9;
    border: 3px solid #263244;
    border-radius: 50%;
  }
  .body {
    position: relative;
    width: 62px;
    height: 72px;
    margin: -2px auto 0;
    background: #2563eb;
    border: 3px solid #263244;
    border-radius: 18px 18px 10px 10px;
  }
  .tool {
    position: absolute;
    right: -34px;
    top: 16px;
    width: 54px;
    height: 9px;
    background: #6b7280;
    border: 2px solid #263244;
    border-radius: 6px;
    transform: rotate(-18deg);
  }
  .legs {
    width: 54px;
    height: 32px;
    margin: 0 auto;
    background: linear-gradient(90deg, #1f2937 0 42%, transparent 42% 58%, #1f2937 58%);
    border-radius: 0 0 12px 12px;
  }
  .hint {
    position: absolute;
    left: 50%;
    bottom: 170px;
    transform: translateX(-50%);
    min-width: min(420px, 88%);
    text-align: center;
    background: rgba(255,255,255,.9);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 9px 10px;
    font-weight: 800;
    color: #334155;
    z-index: 8;
  }
  .floating {
    position: absolute;
    font-weight: 900;
    color: #ef4444;
    text-shadow: 0 2px 0 #fff;
    pointer-events: none;
    z-index: 9;
    animation: floatUp .7s ease-out forwards;
  }
  @keyframes floatUp { to { transform: translateY(-42px); opacity: 0; } }
  .controls {
    position: absolute;
    left: 12px;
    right: 12px;
    bottom: 12px;
    display: grid;
    grid-template-columns: 148px 1fr;
    gap: 10px;
    align-items: end;
    z-index: 10;
  }
  .dpad {
    display: grid;
    grid-template-columns: 48px 48px 48px;
    grid-template-rows: 48px 48px 48px;
    gap: 2px;
  }
  .dpad button:nth-child(1) { grid-column: 2; grid-row: 1; }
  .dpad button:nth-child(2) { grid-column: 1; grid-row: 2; }
  .dpad button:nth-child(3) { grid-column: 3; grid-row: 2; }
  .dpad button:nth-child(4) { grid-column: 2; grid-row: 3; }
  .actionGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  button {
    appearance: none;
    border: 0;
    border-radius: 8px;
    padding: 13px 12px;
    font-weight: 900;
    color: white;
    background: var(--blue);
    box-shadow: 0 7px 0 #1d4ed8, 0 14px 28px rgba(37,99,235,.22);
    cursor: pointer;
    touch-action: none;
    font-size: 15px;
  }
  button:active {
    transform: translateY(4px);
    box-shadow: 0 3px 0 #1d4ed8, 0 8px 18px rgba(37,99,235,.2);
  }
  button.sell {
    background: var(--green);
    box-shadow: 0 7px 0 #15803d, 0 14px 28px rgba(22,163,74,.22);
  }
  button.orange {
    background: var(--orange);
    box-shadow: 0 7px 0 #b45309, 0 14px 28px rgba(245,158,11,.22);
  }
  button.red {
    background: var(--red);
    box-shadow: 0 7px 0 #b91c1c, 0 14px 28px rgba(239,68,68,.18);
  }
  button:disabled {
    background: #9ca3af;
    box-shadow: 0 7px 0 #6b7280;
    cursor: not-allowed;
  }
  .side { display: flex; flex-direction: column; gap: 12px; }
  .panel {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    box-shadow: 0 16px 40px rgba(31,72,109,.1);
  }
  .panel h2 { margin: 0 0 10px; font-size: 16px; }
  .upgrade { display: grid; gap: 8px; }
  .upgradeCard {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px;
    background: rgba(255,255,255,.68);
  }
  .upgradeCard strong { display: block; font-size: 14px; }
  .upgradeCard small { display: block; color: var(--muted); line-height: 1.45; }
  .upgradeCard button {
    min-width: 86px;
    padding: 10px 9px;
    font-size: 13px;
    box-shadow: none;
  }
  .quest { display: grid; gap: 7px; font-size: 13px; }
  .questLine {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--line);
  }
  .questLine:last-child { border-bottom: 0; padding-bottom: 0; }
  .good { color: var(--green); font-weight: 900; }
  .warn { color: #b45309; font-weight: 900; }
  .log {
    height: 116px;
    overflow: auto;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }
  .history {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; padding: 10px; }
    .top { align-items: flex-start; flex-direction: column; }
    .stats { justify-content: flex-start; width: 100%; }
    .pill { flex: 1; min-width: 82px; }
    .arena { min-height: 620px; }
    .bearWrap { width: 210px; left: 58%; top: 40%; }
    .vendor { left: 82%; top: 71%; transform: translate(-50%, -50%) scale(.88); }
    .player { width: 80px; height: 130px; transform: translate(-50%, -50%) scale(.9); }
    .controls { grid-template-columns: 148px 1fr; }
    .actionGrid { grid-template-columns: 1fr; }
    .hint { bottom: 168px; }
  }
  @media (max-width: 430px) {
    h1 { font-size: 20px; }
    .arena { min-height: 590px; }
    .controls { grid-template-columns: 144px 1fr; gap: 8px; }
    .dpad { grid-template-columns: 46px 46px 46px; grid-template-rows: 46px 46px 46px; }
    button { font-size: 14px; padding: 11px 9px; }
    .hint { font-size: 13px; bottom: 160px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <h1>スノーハント商会 <small>v0.2</small></h1>
      <div class="subtitle">移動して、近づいて、白熊を撃退。肉を売って装備を強化します。</div>
    </div>
    <div class="stats">
      <div class="pill"><b id="coins">0</b><span>コイン</span></div>
      <div class="pill"><b id="meat">0 / 10</b><span>肉</span></div>
      <div class="pill"><b id="damage">1</b><span>攻撃力</span></div>
      <div class="pill"><b id="kills">0</b><span>撃退数</span></div>
    </div>
  </header>

  <main class="arena" id="arena">
    <div class="mountain"></div>
    <div class="snowfield"></div>

    <div class="hpBox">
      <div class="hpTop">
        <span id="bearName">白熊 Lv.1</span>
        <span id="hpText">20 / 20</span>
      </div>
      <div class="bar"><div class="barFill" id="hpFill"></div></div>
    </div>

    <div class="worldItem bearWrap" id="bearWrap" title="近づくと攻撃できます">
      <div class="bear">
        <div class="claw left"></div>
        <div class="claw right"></div>
        <div class="face">
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="nose"></div>
        </div>
      </div>
    </div>

    <div class="worldItem vendor" id="vendor">
      <div class="roof"></div>
      <div class="stall"></div>
    </div>

    <div class="worldItem player" id="player">
      <div class="head"></div>
      <div class="body"><div class="tool"></div></div>
      <div class="legs"></div>
    </div>

    <div class="hint" id="hint">十字キーか矢印キーで移動</div>

    <div class="controls">
      <div class="dpad" aria-label="移動">
        <button data-dir="up">↑</button>
        <button data-dir="left">←</button>
        <button data-dir="right">→</button>
        <button data-dir="down">↓</button>
      </div>
      <div class="actionGrid">
        <button id="attackBtn">攻撃</button>
        <button class="sell" id="sellBtn">売却</button>
      </div>
    </div>
  </main>

  <aside class="side">
    <section class="panel">
      <h2>強化</h2>
      <div class="upgrade">
        <div class="upgradeCard">
          <div><strong>武器強化</strong><small>攻撃力 +1。撃退スピードが上がります。</small></div>
          <button class="orange" id="weaponBtn">30</button>
        </div>
        <div class="upgradeCard">
          <div><strong>大きなリュック</strong><small>肉の最大所持数 +5。売りに戻る回数を減らせます。</small></div>
          <button class="orange" id="bagBtn">45</button>
        </div>
        <div class="upgradeCard">
          <div><strong>相棒ハンター</strong><small>白熊の近くにいる時、自動で追加攻撃します。</small></div>
          <button class="orange" id="autoBtn">80</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>現在の商売</h2>
      <div class="quest">
        <div class="questLine"><span>肉の売値</span><strong id="price">5 コイン</strong></div>
        <div class="questLine"><span>自動攻撃</span><strong id="autoText">0 / 秒</strong></div>
        <div class="questLine"><span>状態</span><strong id="statusText">移動中</strong></div>
        <div class="questLine"><span>目標</span><strong id="goalText" class="warn">撃退 0 / 10</strong></div>
      </div>
    </section>

    <section class="panel">
      <h2>ログ</h2>
      <div class="log" id="log"></div>
    </section>

    <section class="panel">
      <h2>更新履歴</h2>
      <div class="history">
        <div><strong>v0.2</strong> キャラ移動、近距離攻撃、売店売却を追加</div>
        <div><strong>v0.1</strong> 初回公開</div>
      </div>
    </section>

    <section class="panel">
      <button class="red" id="resetBtn" style="width:100%">最初から</button>
    </section>
  </aside>
</div>

<script>
(() => {
  const saveKey = "snow-hunt-game-v02";
  const defaultState = {
    coins: 0,
    meat: 0,
    capacity: 10,
    damage: 1,
    kills: 0,
    level: 1,
    hp: 20,
    maxHp: 20,
    meatPrice: 5,
    weaponCost: 30,
    bagCost: 45,
    autoCost: 80,
    autoDamage: 0,
    playerX: 22,
    playerY: 75,
    lastAuto: performance.now()
  };
  const state = { ...defaultState };
  try {
    const saved = JSON.parse(localStorage.getItem(saveKey) || "null");
    if (saved) Object.assign(state, saved, { lastAuto: performance.now() });
  } catch (e) {}

  const el = {
    arena: document.getElementById("arena"),
    player: document.getElementById("player"),
    bearWrap: document.getElementById("bearWrap"),
    vendor: document.getElementById("vendor"),
    coins: document.getElementById("coins"),
    meat: document.getElementById("meat"),
    damage: document.getElementById("damage"),
    kills: document.getElementById("kills"),
    bearName: document.getElementById("bearName"),
    hpText: document.getElementById("hpText"),
    hpFill: document.getElementById("hpFill"),
    hint: document.getElementById("hint"),
    attackBtn: document.getElementById("attackBtn"),
    sellBtn: document.getElementById("sellBtn"),
    weaponBtn: document.getElementById("weaponBtn"),
    bagBtn: document.getElementById("bagBtn"),
    autoBtn: document.getElementById("autoBtn"),
    price: document.getElementById("price"),
    autoText: document.getElementById("autoText"),
    statusText: document.getElementById("statusText"),
    goalText: document.getElementById("goalText"),
    log: document.getElementById("log"),
    resetBtn: document.getElementById("resetBtn")
  };

  const points = {
    bear: { x: 58, y: 44 },
    vendor: { x: 83, y: 74 }
  };
  const keys = {};
  let lastFrame = performance.now();
  let saveTimer = 0;

  function distance(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }
  function playerPoint() {
    return { x: state.playerX, y: state.playerY };
  }
  function nearBear() {
    return distance(playerPoint(), points.bear) < 18;
  }
  function nearVendor() {
    return distance(playerPoint(), points.vendor) < 15;
  }
  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }
  function saveGame() {
    const data = { ...state };
    delete data.lastAuto;
    localStorage.setItem(saveKey, JSON.stringify(data));
  }
  function addLog(text) {
    const div = document.createElement("div");
    div.textContent = text;
    el.log.prepend(div);
    while (el.log.children.length > 18) el.log.lastChild.remove();
  }
  function floatText(text, color, x, y) {
    const f = document.createElement("div");
    f.className = "floating";
    f.textContent = text;
    f.style.color = color || "#ef4444";
    f.style.left = (x || points.bear.x) + "%";
    f.style.top = (y || points.bear.y) + "%";
    el.arena.appendChild(f);
    setTimeout(() => f.remove(), 720);
  }
  function calcBear() {
    state.level = 1 + Math.floor(state.kills / 3);
    state.maxHp = Math.round(20 * Math.pow(1.22, state.level - 1) + state.level * 5);
    state.hp = state.maxHp;
  }
  function attack(amount, silent) {
    if (!nearBear() && !silent) {
      addLog("白熊に近づくと攻撃できます。");
      return;
    }
    if (state.hp <= 0) return;
    state.hp = Math.max(0, state.hp - amount);
    if (!silent) {
      el.bearWrap.classList.add("hit");
      setTimeout(() => el.bearWrap.classList.remove("hit"), 90);
      floatText("-" + amount, "#ef4444", points.bear.x, points.bear.y);
    }
    if (state.hp <= 0) defeatBear();
    render();
  }
  function defeatBear() {
    const base = 2 + Math.floor(state.level / 2);
    const gained = Math.min(state.capacity - state.meat, base);
    const overflow = base - gained;
    state.meat += Math.max(0, gained);
    state.kills += 1;
    if (gained > 0) {
      floatText("肉 +" + gained, "#16a34a", points.bear.x, points.bear.y);
      addLog("白熊 Lv." + state.level + "を撃退。肉 +" + gained);
    }
    if (overflow > 0) addLog("リュックが満杯です。売店で肉を売りましょう。");
    if (state.kills === 10) addLog("目標達成。ここからは高レベルの白熊で稼げます。");
    calcBear();
    saveGame();
  }
  function sell() {
    if (!nearVendor()) {
      addLog("売店に近づくと肉を売れます。");
      return;
    }
    if (state.meat <= 0) {
      addLog("売る肉がありません。まずは集めましょう。");
      return;
    }
    const earned = state.meat * state.meatPrice;
    state.coins += earned;
    addLog("肉を売却。" + earned + "コイン獲得。");
    floatText("+" + earned + "C", "#f59e0b", points.vendor.x, points.vendor.y);
    state.meat = 0;
    saveGame();
    render();
  }
  function buy(type) {
    if (type === "weapon" && state.coins >= state.weaponCost) {
      state.coins -= state.weaponCost;
      state.damage += 1;
      state.weaponCost = Math.round(state.weaponCost * 1.55);
      addLog("武器を強化。攻撃力が上がりました。");
    }
    if (type === "bag" && state.coins >= state.bagCost) {
      state.coins -= state.bagCost;
      state.capacity += 5;
      state.bagCost = Math.round(state.bagCost * 1.6);
      addLog("リュックを強化。もっと肉を持てます。");
    }
    if (type === "auto" && state.coins >= state.autoCost) {
      state.coins -= state.autoCost;
      state.autoDamage += 1;
      state.autoCost = Math.round(state.autoCost * 1.75);
      addLog("相棒ハンターを雇いました。白熊の近くで自動攻撃します。");
    }
    saveGame();
    render();
  }
  function render() {
    el.player.style.left = state.playerX + "%";
    el.player.style.top = state.playerY + "%";
    const canAttack = nearBear();
    const canSell = nearVendor();
    el.player.classList.toggle("near", canAttack || canSell);
    el.coins.textContent = state.coins;
    el.meat.textContent = state.meat + " / " + state.capacity;
    el.damage.textContent = state.damage;
    el.kills.textContent = state.kills;
    el.bearName.textContent = "白熊 Lv." + state.level;
    el.hpText.textContent = state.hp + " / " + state.maxHp;
    el.hpFill.style.width = Math.max(0, state.hp / state.maxHp * 100) + "%";
    el.price.textContent = state.meatPrice + " コイン";
    el.autoText.textContent = state.autoDamage + " / 秒";
    el.weaponBtn.textContent = state.weaponCost;
    el.bagBtn.textContent = state.bagCost;
    el.autoBtn.textContent = state.autoCost;
    el.weaponBtn.disabled = state.coins < state.weaponCost;
    el.bagBtn.disabled = state.coins < state.bagCost;
    el.autoBtn.disabled = state.coins < state.autoCost;
    el.attackBtn.disabled = !canAttack;
    el.sellBtn.disabled = !canSell || state.meat <= 0;
    if (canAttack) {
      el.hint.textContent = "白熊に接近中：攻撃できます";
      el.statusText.textContent = "攻撃可能";
    } else if (canSell) {
      el.hint.textContent = "売店に接近中：肉を売れます";
      el.statusText.textContent = "売却可能";
    } else {
      el.hint.textContent = "十字キーか矢印キーで移動";
      el.statusText.textContent = "移動中";
    }
    el.goalText.textContent = state.kills >= 10 ? "達成済み" : "撃退 " + state.kills + " / 10";
    el.goalText.className = state.kills >= 10 ? "good" : "warn";
  }
  function reset() {
    Object.assign(state, { ...defaultState, lastAuto: performance.now() });
    localStorage.removeItem(saveKey);
    el.log.innerHTML = "";
    addLog("新しい商売を開始しました。");
    render();
  }
  function setDir(dir, on) {
    if (dir === "up") keys.ArrowUp = on;
    if (dir === "down") keys.ArrowDown = on;
    if (dir === "left") keys.ArrowLeft = on;
    if (dir === "right") keys.ArrowRight = on;
  }
  function frame(now) {
    const dt = Math.min(0.04, (now - lastFrame) / 1000);
    lastFrame = now;
    let dx = 0;
    let dy = 0;
    if (keys.ArrowUp || keys.w) dy -= 1;
    if (keys.ArrowDown || keys.s) dy += 1;
    if (keys.ArrowLeft || keys.a) dx -= 1;
    if (keys.ArrowRight || keys.d) dx += 1;
    if (dx || dy) {
      const len = Math.sqrt(dx * dx + dy * dy);
      const speed = 32;
      state.playerX = clamp(state.playerX + (dx / len) * speed * dt, 8, 92);
      state.playerY = clamp(state.playerY + (dy / len) * speed * dt, 35, 88);
      saveTimer += dt;
      if (saveTimer > 0.5) {
        saveTimer = 0;
        saveGame();
      }
    }
    const autoDt = (now - state.lastAuto) / 1000;
    if (state.autoDamage > 0 && nearBear() && autoDt >= 0.4) {
      const amount = Math.max(1, Math.floor(state.autoDamage * autoDt));
      attack(amount, true);
      state.lastAuto = now;
    }
    render();
    requestAnimationFrame(frame);
  }

  document.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();
    if (["arrowup", "arrowdown", "arrowleft", "arrowright", "w", "a", "s", "d"].includes(k)) {
      e.preventDefault();
      keys[e.key.startsWith("Arrow") ? e.key : k] = true;
    }
    if (k === " " || k === "enter") attack(state.damage);
  });
  document.addEventListener("keyup", (e) => {
    const k = e.key.toLowerCase();
    keys[e.key.startsWith("Arrow") ? e.key : k] = false;
  });
  document.querySelectorAll("[data-dir]").forEach((btn) => {
    const dir = btn.dataset.dir;
    btn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      btn.setPointerCapture(e.pointerId);
      setDir(dir, true);
    });
    btn.addEventListener("pointerup", () => setDir(dir, false));
    btn.addEventListener("pointercancel", () => setDir(dir, false));
    btn.addEventListener("pointerleave", () => setDir(dir, false));
  });
  el.attackBtn.addEventListener("click", () => attack(state.damage));
  el.bearWrap.addEventListener("click", () => attack(state.damage));
  el.sellBtn.addEventListener("click", sell);
  el.weaponBtn.addEventListener("click", () => buy("weapon"));
  el.bagBtn.addEventListener("click", () => buy("bag"));
  el.autoBtn.addEventListener("click", () => buy("auto"));
  el.resetBtn.addEventListener("click", reset);

  addLog("v0.2公開。キャラを動かして遊べるようになりました。");
  render();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
